name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  plugin_test:
    name: asdf plugin test (${{ matrix.os }})
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: asdf_plugin_test
        uses: asdf-vm/actions/plugin-test@v3
        with:
          command: sourcery --version
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
