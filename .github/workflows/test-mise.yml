name: mise

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: 0 0 * * 5

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: mise test (${{ matrix.os }})
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Swift (Ubuntu only)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Mise
        uses: jdx/mise-action@v3
        with:
          install: false

      - run: mise exec asdf:https://github.com/mise-plugins/mise-sourcery@latest -- sourcery --version
